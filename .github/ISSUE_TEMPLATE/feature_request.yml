name: Feature request
description: Suggest an addition or change to quietset
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: >
        Please skim [AGENTS.md](https://github.com/kent-tokyo/quietset/blob/main/AGENTS.md) first —
        it lists quietset's scope and explicit non-goals. Requests outside that scope are unlikely
        to be accepted.
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case, not just the desired API/flag.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: A CLI flag, Rust API addition, or behavior change you'd suggest, if you have one.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Can this be done today with existing commands/flags, or with a shell pipeline?

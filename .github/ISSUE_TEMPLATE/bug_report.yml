name: Bug report
description: Something isn't working as expected
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: >
        Ideally a small JSONL/CSV input plus the exact `quietset` command (or Rust snippet) that
        triggers the issue.
      render: shell
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: quietset version
      description: Output of `quietset --version` (or the `quietset`/`quietset-cli` crate version).
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: e.g. macOS 15, Ubuntu 24.04, Windows 11

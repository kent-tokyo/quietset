# cargo-deny configuration. See https://embarkstudios.github.io/cargo-deny/
#
# The license allow-list below was generated by running `cargo deny check licenses`
# against this workspace's actual dependency tree (including dev-dependencies and
# cross-platform targets) and allow-listing exactly what came back — not copied from
# a generic template.

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSL-1.0",
    "Unicode-3.0",
    "Unlicense",
]

[bans]
# Duplicate transitive dependency versions are common and not worth failing CI over;
# surface them as a warning instead.
multiple-versions = "warn"

[advisories]
ignore = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
